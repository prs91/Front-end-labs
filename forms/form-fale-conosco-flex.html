<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fale Conosco</title>
    <link rel="stylesheet" href="css/fale-conosco.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap" rel="stylesheet">
  </head>
  <body>
    <main class="container">
        <header>
            <h1>Fale Conosco</h1>
            <p>Estamos aqui para ajudar! Preencha o formulario abaixo e entraremos em
                contato com voce o mais breve possivel.</p>
        </header>
        <form action="#">
            <div class="form-group">
                <label for="name"></label>Primeiro Nome</label>
                <input 
                type="text" 
                id="name" 
                name="name"
                placeholder="Seu Nome..." 
                required
                maxlength="40"
                minlength="2"/>
            </div>

            <div class="form-group">
                <label for="last_name"></label>Último Nome</label>
                <input 
                type="text" 
                id="last_name" 
                name="last_name"
                placeholder="Seu Sobrenome..." 
                required
                maxlength="40"
                minlength="2"/>
                
            </div>

            <div class="form-group">
                <label for="email"></label>E-mail</label>
                <input 
                type="email" 
                id="email" 
                name="email"
                placeholder="Seu email..." 
                required
                maxlength="30"/>
                
            </div>

            <div class="form-group">
                <label for="País">País</label> 
                <select name="país" id="país">
                    <option disabled selected>Selecione seu pais...</option>
                    <option value="brasil">Brasil</option>
                    <option value="portugal">Portugal</option>
                    <option value="angola">Angola</option>




                </select>
                
            </div>

            <div class="form-group">
                <label for="message">Assunto</label>
                <textarea
                name="message"
                id="message"
                placeholder="Esceva aqui..."
                required
                maxlength="500">
                </textarea>
                
                
            </div>

            <div class="btn-container">
                <input type="reset" value="limpar">
                <input type="submit" value="enviar">
            </div>
        </form>
        <footer class="footer-contact">
            <p>Em caso de dúvidas, entre em contato 📞</p>
        </footer>
    </main>
  </body>
</html>
